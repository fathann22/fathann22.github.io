<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="style.css">
	<title>Login</title>
</head>

<body>
	<div class="wrapper">
		<form action="">
			<h1>Login</h1>
			<div class="input-box">
				<input type="text" placeholder="Username" required name="username" id="user">
			</div>
			<div class="input-box">
				<input type="password" placeholder="Password" required name="password" id="pass">
			</div>
			<div class="remember-forgot">
				<label><input type="checkbox">Remember me</label>
				<a href="index3.html">Forgot Password</a>
			</div>
			<div class="login">
				<button type="button" onclick="login()">Login</button>
			</div>
			<div class="register-link">
				<p>Don't have an account?
					<a href="index2.html">Register</a>
				</p>
			</div>
		</form>
	</div>
</body>
<script>
	function login() {
		let username = document.getElementById("user").value;
		let password = document.getElementById("pass").value;

		if (username === "Fathann" && password === "Qwerty123") {
			alert("Login Berhasil");
		} else {
			alert("Login Gagal");
		}
	}

</script>

</html>
